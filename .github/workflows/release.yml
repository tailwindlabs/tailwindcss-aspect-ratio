name: Release

on:
  push:
    branches: [master]
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Resolve release metadata
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "RELEASE_KIND=release" >> $GITHUB_ENV
            echo "RELEASE_CHANNEL=latest" >> $GITHUB_ENV
          else
            echo "RELEASE_KIND=insiders" >> $GITHUB_ENV
            echo "INSIDERS_VERSION=0.0.0-insiders.$(git rev-parse --short HEAD)" >> $GITHUB_ENV
            echo "RELEASE_CHANNEL=insiders" >> $GITHUB_ENV
          fi

      - name: Version based on commit
        if: env.RELEASE_KIND == 'insiders'
        run: pnpm version "$INSIDERS_VERSION" --force --no-git-tag-version

      - name: Publish
        run: pnpm publish --provenance --tag "$RELEASE_CHANNEL"
